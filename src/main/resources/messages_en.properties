bot.help=Hello! I am your chat assistant, ready to help you with various tasks. Here are the commands I understand:\n\n\
✨ **Basic commands:**\n\n\
🔹 **/hello** - Greeting from the bot\n\n\
📰 **/news** - Share news or interesting information. Add a photo if you want (optional). The bot will discuss it with you!\n\n\
📄 **/articles** - Create a full article. Share a link or text, and the bot will generate a detailed article and send it in .docx format!\n\n\
📝 **/text** - Transcribe audio or video to text. Send me an audio/video file or reply with this command to an audio/video message - I will convert it to text.\n\n\
🎵 **/audio** - Extract audio from video in MP3. Send me a video file or reply with this command to a video message - I will extract the sound.\n\n\
💬 **/help** - Show this information\n\n\
🚀 **/start** - Start working with the bot\n\n\
---\n\n\
**How it works:**\n\
• All your questions will be resolved using Gemini AI\n\
• In groups, the bot automatically transcribes audio and video\n\
• You can share a media link - the bot will download it in the background\n\
• Conversation context is preserved for better understanding\n\n\
Ready to help! 😊
