bot.help=Ahoj! Som tvoj četový asistent, ktorý ti pomôže s rôznymi úlohami. Tu sú príkazy, ktorým rozumiem:\n\n\
✨ **Hlavné príkazy:**\n\n\
🔹 **/hello** - Pozdrav od bota\n\n\
📰 **/news** - Zdieľaj novinku alebo zaujímavú informáciu. Ak chceš, pridaj fotku (voliteľné). Bot to s tebou prediskutuje!\n\n\
📄 **/articles** - Vytvor plnohodnotný článok. Zdieľaj odkaz alebo text a bot vygeneruje podrobný článok a odošle ho vo formáte .docx!\n\n\
📝 **/text** - Prepíš zvuk alebo video na text. Pošli mi zvukový/video súbor alebo odpovedz týmto príkazom na zvukovú/video správu - premením ju na text.\n\n\
🎵 **/audio** - Extrahuj zvuk z videa do MP3. Pošli mi video súbor alebo odpovedz týmto príkazom na video správu - vytiahnem zvuk.\n\n\
💬 **/help** - Zobraziť tieto informácie\n\n\
🚀 **/start** - Začať prácu s botom\n\n\
---\n\n\
**Ako to funguje:**\n\
• Všetky tvoje otázky budú vyriešené pomocou Gemini AI\n\
• V skupinách bot automaticky prepisuje zvuk a video\n\
• Môžeš zdieľať odkaz na médiá - bot ich stiahne na pozadí\n\
• Kontext konverzácií sa ukladá pre lepšie pochopenie\n\n\
Pripravený pomôcť! 😊
