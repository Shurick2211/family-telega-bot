bot.help=Привет! Я - твой чат-ассистент, который поможет тебе с различными задачами. Вот какие команды я понимаю:\n\n\
✨ **Основные команды:**\n\n\
🔹 **/hello** - Привет от бота\n\n\
📰 **/news** - Поделись новостью или интересной информацией. Добавь фото, если хочешь (опционально). Бот обсудит это с тобой!\n\n\
📄 **/articles** - Создай полноценную статью. Поделись ссылкой или текстом, и бот сгенерирует подробную статью и отправит ее в формате .docx!\n\n\
📝 **/text** - Транскрибируй аудио или видео в текст. Отправь мне аудио/видео файл или ответь этой командой на аудио/видеозапись - я превращу его в текст.\n\n\
🎵 **/audio** - Извлеки аудио из видеозаписи в MP3. Отправь мне видеофайл или ответь этой командой на видеозапись - я извлеку звук.\n\n\
💬 **/help** - Показать эту информацию\n\n\
🚀 **/start** - Начать работу с ботом\n\n\
---\n\n\
**Как это работает:**\n\
• Все твои вопросы будут решены с помощью Gemini AI\n\
• В группах бот автоматически транскрибирует аудио и видео\n\
• Ты можешь поделиться ссылкой на медиа - бот загрузит его в фоне\n\
• Контекст бесед сохраняется для лучшего понимания\n\n\
Готов помочь! 😊
